<mat-card
  class="icone-card flex flex-col items-center justify-center"
  [ngClass]="cardSizeClass"
  (click)="onCardClick()">

  <img [attr.src]="'/assets/images/icons/' + title.toLowerCase().replaceAll(' ', '-').replaceAll('/', '-') + '.png'"class="image"/>

  <mat-card-title>
    {{ title }}
  </mat-card-title>

</mat-card>
