<div class="p-2 flex flex-col items-start gap-1">

  @if (showActivity) {
    <p><strong>Activité :</strong> {{ event.activityName }}</p>
  }
  @if (getStatus(event)) {
    <p><strong>Status de l'activité :</strong> {{ getStatusLabel(getStatus(event)) }}</p>
  }
  @if (showAddress) {
    <p><strong></strong> {{ event.addressLabel }}</p>
  }

</div>
