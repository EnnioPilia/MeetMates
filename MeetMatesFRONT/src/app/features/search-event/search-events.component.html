<div class="flex flex-col items-center justify-start min-h-[90vh] px-7 py-10 mb-10 mt-3">

    <app-input
      label="Rechercher une activité"
      class="mt-8"
      [control]="form.controls['query']">
    </app-input>

  <div *ngIf="loading()" class="text-gray-500 mt-6 animate-pulse">
    Recherche en cours...
  </div>

  <div *ngIf="!loading() && results().length > 0">

    <mat-accordion multi class="w-80 flex flex-col mt-2 p-1 gap-5">

      <app-event-card
        *ngFor="let event of results(); trackBy: trackById"
        [event]="event"
        [onViewDetails]="goToEventDetails.bind(this)">
      </app-event-card>

    </mat-accordion>
  </div>

  <div *ngIf="!loading() && results().length === 0 && form.controls['query'].value?.length > 0" class="text-gray-400 mt-8 text-center">
    Aucun événement trouvé pour<span class="font-semibold text-gray-600">"{{ form.controls['query'].value }}"</span>
  </div>
  
</div>
