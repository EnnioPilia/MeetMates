<div class="flex flex-col items-center px-8 py-12 min-h-screen overflow-auto bg-gray-50">
  @if (loading()) {
    <div class="flex flex-col items-center justify-center h-full gap-6 mt-10">
      <mat-progress-spinner mode="indeterminate" diameter="70"></mat-progress-spinner>
      <p>chargement des données...</p>
    </div>
  } 
  @else if (error()) {
    <p class="text-red-600 font-semibold mt-10">{{ error() }}</p>
  } 
  @else {
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col items-center gap-4 w-full max-w-2xl mt-10 mb-10">

        <app-post-select 
          [form]="form" 
          [activities]="activities">
        </app-post-select>

        <app-post-text-fields [form]="form"></app-post-text-fields>
        <app-post-date-time [form]="form"></app-post-date-time>
        
        <app-post-options 
          [form]="form" 
          [materialOptions]="materialOptions" 
          [levelOptions]="levelOptions">
        </app-post-options>

        <app-post-address 
          [form]="form" controlName="adresse" 
          [suggestions]="addressSuggestions()"
          (inputChange)="onAddressInput($event)" 
          (optionSelected)="onAddressSelect($event)">
        </app-post-address>

        <app-button 
          label="CRÉER L’ACTIVITÉ"  
          class="primary-button w-80" 
          type="submit"
          [disabled]="isSubmitting">
        </app-button>

    </form>
    } 
</div>
