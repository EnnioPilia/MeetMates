<div class="flex flex-col items-center px-8 py-12 min-h-screen overflow-auto bg-gray-50">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col items-center gap-4 w-full max-w-2xl mt-10 mb-10">

        <app-post-select [form]="form" [activities]="activities"></app-post-select>

        <app-post-text-fields [form]="form"></app-post-text-fields>

        <app-post-date-time [form]="form"></app-post-date-time>

        <app-post-options [form]="form" [materialOptions]="materialOptions" [levelOptions]="levelOptions"></app-post-options>

        <app-post-address [form]="form" controlName="adresse" [suggestions]="addressSuggestions"
            (inputChange)="onAddressInput($event)" (optionSelected)="onAddressSelect($event)">
        </app-post-address>

        <app-picture-uploader [previewUrl]="previewUrl" label="Photo de l’activité" 
            (fileSelected)="onFileSelected($event)" (remove)="removeImage()">
        </app-picture-uploader>

        <app-button label="CRÉER L’ACTIVITÉ"  class="primary-button w-80"  type="submit"[disabled]="isSubmitting"></app-button>

    </form>
</div>
