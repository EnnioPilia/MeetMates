<div class="flex flex-col items-center justify-start min-h-[70vh] px-7 py-10 mt-3">
  @if (loading()) {
    <app-loading-spinner></app-loading-spinner> 
  }
  @else if (error()) {
    <p class="text-red-600 mt-10">{{ error() }}</p>
  } 
  @else if (events().length > 0) {
    <div class="flex flex-col items-center gap-6 w-full max-w-3xl">
      @for (event of events(); track event.id) {
        <div #eventCard [attr.data-id]="event.id" class=" w-full flex flex-col items-center p-6">

          <app-event-header
            class="title mb-2"
            [title]="event.title"
            [description]="event.description">
          </app-event-header>

          <app-event-info
            class="mb-3"
            [event]="event"
            [showStatus]="true">
          </app-event-info>

          <app-button
            class="w-80 primary-button mt-4 mb-3"
            label="P A R T I C I P E R"
            (clicked)="joinEvent(event.id)">
          </app-button>

        </div>
      }
    </div>
  }
  @else {
    <div class="flex flex-col items-center justify-center h-[60vh] text-center">
      <p> AUCUNE ACTIVITÉ DISPONIBLE<br><br>Soyez le premier à proposer un événement pour cette activité.</p>
    </div>
  }
</div>
