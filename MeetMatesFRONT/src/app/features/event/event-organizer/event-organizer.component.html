<div class="flex flex-col items-center justify-start min-h-screen px-7 py-20 overflow-y-auto">
  @if (loading) {
  <mat-spinner diameter="50"></mat-spinner>
  }
  @else if (event) {
    
  <div class="activity-card w-full flex flex-col items-center p-6">

    <app-event-organizer-actions [eventId]="event.id"(delete)="onDeleteEvent($event)"></app-event-organizer-actions>

    <app-event-header [title]="event.title" [description]="event.description"></app-event-header>

    <app-event-requests-tabs [acceptedParticipants]="event.acceptedParticipants"
      [pendingParticipants]="event.pendingParticipants" [organizerName]="event.organizerName"
      (accept)="onAccept($event)" (reject)="onReject($event)" (remove)="onRemove($event)">
    </app-event-requests-tabs>

    <app-event-organizer-info [event]="event"></app-event-organizer-info>

  </div>

  }
  @else {
  <p class="text-red-600">Événement introuvable.</p>
  }
</div>
