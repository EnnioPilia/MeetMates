<div class="flex flex-col items-center justify-start min-h-screen px-7 py-10 mt-3">
  @if (loading) {
  <div class="flex justify-center items-center h-[50vh]">
    <mat-spinner diameter="50"></mat-spinner>
  </div>
  }
  @else if (events.length > 0) {
  <div class="flex flex-col items-center gap-1 w-full max-w-3xl">
    @for (event of events; track event.id) {

    <mat-card class="activity-card w-full flex flex-col items-center p-6">

      <app-event-header [title]="event.title" [description]="event.description"></app-event-header>

      <app-event-picture [imageUrl]="event.imageUrl" [title]="event.title" [width]="290" [height]="130"></app-event-picture>

      <app-event-info [event]="event" [showStatus]="true"></app-event-info>

      <app-button label="P A R T I C I P E R" class="w-80 primary-button" [disabled]="!isEventOpen(event)"(clicked)="joinEvent(event.id)"></app-button>

    </mat-card>
    }
  </div>
  }
  @else {
  <div class="flex flex-col items-center justify-center h-[50vh]">
    <p class="card-text mt-4 mb-4 ml-2 mr-2 p-8 text-center">
      AUCUNE ACTIVITÉ DISPONIBLE <br><br>
      Soyez le premier à proposer un événement pour cette activité.
    </p>
  </div>
  }
</div>
