<div class="container flex flex-col items-center min-h-screen px-6 py-10 mt-8">

  <app-state-handler
    [loading]="loading"
    [error]="error">
  </app-state-handler>

  @if (formData()) {

    <app-event-form
      class="mb-10"
      mode="edit"
      [initialData]="formData()!"
      [activities]="activities()"
      [addressSuggestions]="addressSuggestions()"
      (addressInput)="searchAddress($event)"
      (submitForm)="update($event)">
    </app-event-form>

  }
</div>
