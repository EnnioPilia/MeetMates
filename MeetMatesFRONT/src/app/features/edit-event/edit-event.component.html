<div class="flex flex-col items-center justify-start min-h-screen px-6 py-10 mt-8">
  @if (loading()) {
    <div class="flex flex-col items-center justify-center h-full gap-6 mt-10">
      <mat-progress-spinner mode="indeterminate" diameter="70"></mat-progress-spinner>
      <p>chargement des données...</p>
    </div>
  } 
  @else if (error()) {
    <p class="text-red-600">{{ error() }}</p>
  } 
  @else if (event && form) {
    <div class="w-full max-w-3xl p-6 flex flex-col items-center">

      <app-edit-event-info 
        [form]="form">
      </app-edit-event-info>

      <app-edit-event-activity 
        [form]="form" 
        [activities]="activities()">
      </app-edit-event-activity>

      <app-edit-event-address
        [form]="form"
        [suggestions]="addressSuggestions()"
        (inputChange)="onAddressInput($event)">
      </app-edit-event-address>

      <app-edit-event-date-time 
        [form]="form">
      </app-edit-event-date-time>

      <app-edit-event-details 
        [form]="form">
      </app-edit-event-details>

      <app-button 
        label="Sauvegarder" 
        class="primary-button w-80 mb-5"
        (click)="saveChanges()">
      </app-button>

    </div>
  }
</div>
