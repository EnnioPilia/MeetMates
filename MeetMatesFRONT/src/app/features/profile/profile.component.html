<div class="flex fixed flex-col items-center min-h-screen px-10 py-6 mt-10">
  @if (loading()) {
  <mat-spinner diameter="50"></mat-spinner>
  } @else if (error()) {
  <p class="text-red-600 mt-8">{{ error() }}</p>
  } @else {

  <app-settings-menu (logout)="onLogout()"></app-settings-menu>
  <app-profile-card [user]="user()"></app-profile-card>

  <mat-tab-group class="w-full mt-4" mat-align-tabs="start" animationDuration="300ms">
    <mat-tab label="Je participe">
      <app-participation-tab [events]="eventsParticipating()"></app-participation-tab>
    </mat-tab>

    <mat-tab label="J’organise">
      <app-organization-tab [events]="eventsOrganized()"></app-organization-tab>
    </mat-tab>
  </mat-tab-group>
  }
</div>
