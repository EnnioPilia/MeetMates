<div class="flex flex-col items-center justify-center min-h-[calc(100vh-10px)] px-8">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col items-center mt-4">

    <app-input 
      label="Nom" 
      [control]="form.controls.lastName" 
      type="text" 
      [required]="true">
    </app-input>

    <app-input 
      label="Prénom" 
      [control]="form.controls.firstName" 
      type="text" 
      [required]="true">
    </app-input>

    <app-input 
      label="Email" 
      [control]="form.controls.email" 
      type="email" 
      [required]="true">
    </app-input>

    <app-input 
      label="Mot de passe" 
      [control]="form.controls.password" 
      type="password" 
      [required]="true">
    </app-input>

    <app-input 
      label="Confirmez le mot de passe" 
      [control]="form.controls.confirmPassword" 
      type="password"[required]="true">
    </app-input>

    <mat-checkbox
      formControlName="acceptCgu">
       J’accepte les
      <a href="#" (click)="openCguDialog($event)">
       Conditions Générales d’Utilisation</a>
    </mat-checkbox>

    <app-button 
      label="S’inscrire"
      class="w-full primary-button"
      type="submit" 
      [disabled]="isSubmitting">
    </app-button>
   
  </form>
</div>
