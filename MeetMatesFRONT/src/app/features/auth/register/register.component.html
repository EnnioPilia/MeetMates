<div class="flex flex-col items-center justify-center min-h-[calc(100vh-10px)] px-8">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col items-center mt-4">

    <app-input label="Nom" [control]="form.controls.lastName" type="text" [required]="true"></app-input>
    <app-input label="Prénom" [control]="form.controls.firstName" type="text" [required]="true"></app-input>
    <app-input label="Email" [control]="form.controls.email" type="email" [required]="true"></app-input>
    <app-input label="Mot de passe" [control]="form.controls.password" type="password" [required]="true"></app-input>
    <app-button label="S’inscrire" class="w-full primary-button" type="submit" [disabled]="isSubmitting"></app-button>
    <app-button label="Déjà un compte ?" class="secondary-button w-80" (clicked)="navigateTo('login')"></app-button>

  </form>
</div>
