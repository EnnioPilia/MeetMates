<div class="flex flex-col items-center justify-start min-h-screen px-7 py-20">

  <app-state-handler
    [loading]="loading"
    [error]="error">
  </app-state-handler>

  @if (users()) {

    <div class="w-full max-w-5xl flex flex-col gap-4">

      <h2 class="text-3xl font-semibold text-center mb-6">
        Gestion des utilisateurs
      </h2>

      @for (user of users(); track user.id) {
        <div class="bg-white rounded shadow p-5 flex justify-between items-center">

          <div class="flex flex-col">
            <span class="font-semibold">
              {{ user.firstName }} {{ user.lastName }}
            </span>

            <span class="text-sm text-gray-500">
              {{ user.email }}
            </span>

            <span class="text-xs mt-1">
              Rôle : {{ user.role }}
            </span>
          </div>

          <app-button
            label="S U P P R I M E R"
            class=" w-40"
            (clicked)="deleteUser(user.id)">
          </app-button>

        </div>
      }

    </div>

  } @else {

    <p class="text-gray-500 text-center">
      Aucun utilisateur trouvé.
    </p>

  }

</div>
