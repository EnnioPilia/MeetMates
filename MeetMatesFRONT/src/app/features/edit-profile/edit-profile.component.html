<div class="container flex flex-col items-center justify-center min-h-screen px-10 py-6">
  @if (loading()) {
    <app-loading-spinner message="Chargement du profil..."></app-loading-spinner>
  } 
  @else if (error()) {
    <p class="text-red-600 mb-10 pb-10">{{ error() }}</p>
  } 
  @else if (user()) {
    <div class="flex flex-col items-center justify-center w-full max-w-2xl gap-8">
      
      <app-edit-profile-picture 
        [user]="user()!" 
        (photoSelected)="onPhotoSelected($event)"
        (photoDeleted)="onPhotoDeleted()">
      </app-edit-profile-picture>

      <app-edit-profile-form 
        [user]="user()!" 
        (save)="onSave($event)">
      </app-edit-profile-form>

    </div>
  }
</div>
