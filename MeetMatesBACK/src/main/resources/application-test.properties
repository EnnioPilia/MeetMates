# ===============================
# APP CONFIG (TEST)
# ===============================
app.jwtSecret=meetmates-super-secure-jwt-test-secret-key-256-bits-minimum-required
app.jwtExpirationMs=900000
app.jwtRefreshExpirationMs=604800000
app.frontend.url=http://localhost:3000

# ===============================
# DATASOURCE (H2 IN MEMORY)
# ===============================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true

spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=false

# ===============================
# SQL INIT
# ===============================
spring.sql.init.mode=never

# ===============================
# MAIL (FAKE FOR TESTS)
# ===============================
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test
spring.mail.test-connection=false
app.mail.from=no-reply@test.local

# ===============================
# LOGGING
# ===============================
logging.level.com.example.meetmates=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
