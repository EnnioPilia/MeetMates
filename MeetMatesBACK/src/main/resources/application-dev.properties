spring.application.name=meetmates

# Datasource 
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# SQL init (UNE SEULE FOIS)
spring.sql.init.mode=always

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.example.meetmates=INFO
logging.level.org.springframework.web.filter=INFO

# Frontend
app.frontend.url=http://localhost:4200
app.frontend.prod.url=http://100.118.36.88:4200

# JWT 
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=900000
app.jwtRefreshExpirationMs=604800000

