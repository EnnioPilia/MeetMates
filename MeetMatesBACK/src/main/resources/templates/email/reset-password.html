<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <style>
        .container {
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .button {
            display: inline-block;
            background-color: #4A90E2;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <p class="title" th:text="${title}"></p>
        <p th:text="${content}"></p>
        <a class="button" th:href="${actionUrl}" th:text="${buttonText}"></a>
    </div>
</body>

</html>
