# --------------------------
# Messages d'erreurs
# --------------------------
AUTH_BAD_PASSWORD= Mauvais mot de passe.
AUTH_UNAUTHORIZED= Accès non autorisé.

TOKEN_INVALID= Token invalide.
TOKEN_EXPIRED= Token expiré.
TOKEN_NOT_FOUND= Token introuvable.

USER_NOT_FOUND= Utilisateur introuvable.
USER_BANNED= Utilisateur banni.
USER_DISABLED= Compte non vérifié - vérifiez votre email pour valider votre compte
USER_DELETED= Compte supprimé.
USER_EMAIL_USED= Email déjà utilisé.
EMAIL_SEND_FAILED= Impossible d’envoyer l’email. Veuillez réessayer plus tard.
ADDRESS_NOT_FOUND= Adresse introuvable.

INVALID_FILE=Le fichier fourni est invalide ou manquant.
FILE_TOO_LARGE=Le fichier dépasse la taille maximale autorisée.

INVALID_FILE_TYPE=Le type de fichier n’est pas autorisé.
ACTIVITY_NOT_FOUND= Activité introuvable.
CATEGORY_NOT_FOUND= Catégorie introuvable.

EVENT_ALREADY_PARTICIPANT= Vous participez déjà à cet événement.
EVENT_PENDING_ALREADY= Vous avez déjà une demande en attente.
EVENT_REQUEST_REJECTED= Votre demande a été rejetée.
EVENT_INVALID_STATUS= Statut de participation invalide.
EVENT_FORBIDDEN= Vous n’avez pas les droits nécessaires pour effectuer cette action.
EVENT_ORGANIZER_CANNOT_BE_REMOVED= Impossible de retirer l’organisateur.
PARTICIPANT_NOT_FOUND= Participant introuvable.

INTERNAL_ERROR= Une erreur interne est survenue. Veuillez réessayer plus tard.

# ==========================
# Messages de succès
# ==========================
AUTH_REGISTER_SUCCESS= Inscription réussie — vérifiez votre email pour valider votre compte
AUTH_LOGIN_SUCCESS= Connexion réussie
AUTH_VERIFY_SUCCESS= Compte vérifié avec succès
AUTH_LOGOUT_SUCCESS= Déconnexion réussie
AUTH_REFRESH_HANDLED_BY_FILTER= Refresh token traité par le filtre

PASSWORD_RESET_REQUEST_SUCCESS= Email de réinitialisation envoyé avec succès
PASSWORD_RESET_CONFIRM_SUCCESS= Mot de passe réinitialisé avec succès

USER_GET_ALL_SUCCESS= Liste des utilisateurs récupérée avec succès
USER_GET_ME_SUCCESS= Profil utilisateur récupéré avec succès
USER_PROFILE_UPDATE_SUCCESS= Profil modifié avec succès
USER_PICTURE_UPLOAD_SUCCESS= Photo de profil téléchargée avec succès
USER_PICTURE_DELETE_SUCCESS= Photo de profil supprimée avec succès
USER_DELETE_SUCCESS= Utilisateur supprimé avec succès
USER_DELETE_ACCOUNT_SUCCESS= Compte supprimé avec succès

ADDRESS_LIST_OK= Liste des adresses récupérée avec succès
ADDRESS_FOUND_OK= Adresse récupérée avec succès
ADDRESS_CREATED_OK= Adresse créée avec succès
ADDRESS_UPDATED_OK= Adresse mise à jour avec succès
ADDRESS_DELETED_OK= Adresse supprimée avec succès

CATEGORY_LIST_SUCCESS= Liste des catégories récupérée avec succès
CATEGORY_GET_SUCCESS= Catégorie récupérée avec succès

ACTIVITY_LIST_SUCCESS= Liste des activités récupérée avec succès
ACTIVITY_GET_SUCCESS= Activité récupérée avec succès
ACTIVITY_BY_CATEGORY_SUCCESS= Activités par catégorie récupérées avec succès

EVENT_JOIN_SUCCESS= Vous avez rejoint l’événement avec succès.
EVENT_LEAVE_SUCCESS= Vous avez quitté l’événement avec succès
EVENT_PARTICIPANT_ACCEPT_SUCCESS= Participant accepté avec succès
EVENT_PARTICIPANT_REJECT_SUCCESS= Participant refusé avec succès
EVENT_PARTICIPATING_LIST_SUCCESS= Liste des événements auxquels vous participez récupérée avec succès
EVENT_ORGANIZED_LIST_SUCCESS= Liste des événements organisés récupérée avec succès
EVENT_PARTICIPANT_REMOVE_SUCCESS= Participant retiré avec succès
EVENT_DELETED= Cet événement a été supprimé par son organisateur.

EVENT_CREATE_SUCCESS= Événement créé avec succès
EVENT_LIST_SUCCESS= Liste des événements récupérée avec succès
EVENT_GET_SUCCESS= Détails de l’événement récupérés avec succès
EVENT_BY_ACTIVITY_SUCCESS= Événements par activité récupérés avec succès
EVENT_UPDATE_SUCCESS= Événement mis à jour avec succès
EVENT_DELETE_SUCCESS= Événement supprimé avec succès
EVENT_SEARCH_SUCCESS= Résultats de recherche d’événements récupérés avec succès

# ==========================
# Messages de l'admin
# ==========================
ADMIN_USER_SOFT_DELETE_SUCCESS= Utilisateur désactivé avec succès
ADMIN_USER_HARD_DELETE_SUCCESS= Utilisateur supprimé définitivement
ADMIN_USER_RESTORE_SUCCESS= Utilisateur restauré avec succès

ADMIN_EVENT_SOFT_DELETE_SUCCESS= Événement désactivé avec succès
ADMIN_EVENT_RESTORE_SUCCESS= Événement restauré avec succès
ADMIN_EVENT_HARD_DELETE_SUCCESS= Événement supprimé définitivement
